[metadata]
name = "repos"
description = "Browse a GitHub org's repos — local + remote merged. Set TV_GH_ORG and TV_CODE_DIR in your shell."
requirements = ["bash", "gh"]

[source]
command = '''bash -c '
ORG="${TV_GH_ORG:?set TV_GH_ORG to your github org}"
LOCAL_DIR="${TV_CODE_DIR:-$HOME/code/$ORG}"
local_repos=$(ls -1 "$LOCAL_DIR" 2>/dev/null | grep -v "^\\." | grep -v "^CLAUDE")
remote_repos=$(gh repo list "$ORG" --limit 100 --json name --jq ".[].name" 2>/dev/null)
all_repos=$(printf "%s\n%s" "$local_repos" "$remote_repos" | sort -u | grep -v "^$")
for repo in $all_repos; do
  has_local=false; has_remote=false
  [ -d "$LOCAL_DIR/$repo" ] && has_local=true
  echo "$remote_repos" | grep -qx "$repo" && has_remote=true
  if $has_local && $has_remote; then
    printf "\033[32m%s\033[39m  \033[36m[local + github]\033[39m\n" "$repo"
  elif $has_local; then
    printf "\033[32m%s\033[39m  \033[33m[local only]\033[39m\n" "$repo"
  else
    printf "\033[32m%s\033[39m  \033[35m[github only]\033[39m\n" "$repo"
  fi
done
' '''
ansi = true
output = "{strip_ansi|split:  :0}"

[ui]
layout = "portrait"

[preview]
command = '''bash -c '
ORG="${TV_GH_ORG}"
LOCAL_DIR="${TV_CODE_DIR:-$HOME/code/$ORG}"
REPO="{strip_ansi|split:  :0}"
LOCAL="$LOCAL_DIR/$REPO"
if [ -d "$LOCAL" ]; then
  echo "  local: $LOCAL"
  echo ""
  if [ -d "$LOCAL/.git" ]; then
    cd "$LOCAL"
    echo "  last commit:"
    git log -1 --pretty=format:"  %C(yellow)%h%Creset %s (%cr)" 2>/dev/null
    echo ""; echo ""
    echo "  branches:"
    git branch --color=always 2>/dev/null | head -5 | sed "s/^/  /"
    echo ""
  fi
  if [ -f "$LOCAL/README.md" ]; then
    echo "  ─────────────────────────────────"
    head -30 "$LOCAL/README.md" | sed "s/^/  /"
  fi
else
  echo "  not cloned locally"
  echo ""
fi
echo ""
gh repo view "$ORG/$REPO" --json description,isPrivate,pushedAt,defaultBranchRef --jq "
  \"  github: $ORG/$REPO\",
  \"  \(if .isPrivate then \"private\" else \"public\" end)\",
  \"  default branch: \(.defaultBranchRef.name // \"n/a\")\",
  \"  last push: \(.pushedAt // \"n/a\")\",
  \"\",
  \"  \(.description // \"\")\"
" 2>/dev/null || echo "  (not on github)"
' '''

[keybindings]
enter = "actions:cd"
ctrl-o = "actions:open"
ctrl-c = "actions:clone"

[actions.cd]
description = "Open in terminal"
command = '''bash -c 'LOCAL_DIR="${TV_CODE_DIR:-$HOME/code/$TV_GH_ORG}"; DIR="$LOCAL_DIR/{strip_ansi|split:  :0}"; if [ -d "$DIR" ]; then cd "$DIR" && $SHELL; else echo "not cloned — use ctrl-c to clone first"; sleep 2; fi' '''
mode = "execute"

[actions.open]
description = "Open on GitHub"
command = '''bash -c 'gh repo view "$TV_GH_ORG/{strip_ansi|split:  :0}" --web' '''
mode = "fork"

[actions.clone]
description = "Clone locally"
command = '''bash -c 'LOCAL_DIR="${TV_CODE_DIR:-$HOME/code/$TV_GH_ORG}"; gh repo clone "$TV_GH_ORG/{strip_ansi|split:  :0}" "$LOCAL_DIR/{strip_ansi|split:  :0}"' '''
mode = "execute"
